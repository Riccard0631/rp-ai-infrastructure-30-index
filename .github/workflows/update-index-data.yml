name: Update RPAI30 index data

on:
  schedule:
    # Daily after the U.S. market close. GitHub cron is UTC.
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-rpai30-index-data
  cancel-in-progress: false

jobs:
  update-index-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run daily index update
        run: python scripts/run_daily_update.py

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(data): update RPAI30 index data"
          file_pattern: "history.csv backtest_history.csv backtest_summary.json data_status.json output/pdf/RPAI30-factsheet.pdf public/documents/RPAI30-factsheet.pdf"
